<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Autoimmune AI & Flare Prediction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: 
              linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('https://png.pngtree.com/background/20250129/original/pngtree-ai-generated-autoimmune-disorders-glowing-in-the-dark-background-picture-image_15510628.jpg') no-repeat center center fixed;
            min-height: 100vh;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #2c3e50;
            position: relative;
            overflow: hidden;
        }
        
        /* Background pattern */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#4a6fa5 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.05;
            z-index: -1;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(42, 65, 100, 0.1);
            padding: 50px;
            max-width: 580px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.5s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }
        
        /* Accent elements */
        .accent-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4a6fa5, #6b8cce, #4a6fa5);
            background-size: 200% 100%;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Icon */
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4a6fa5, #6b8cce);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(74, 111, 165, 0.2);
        }
        
        .icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
            line-height: 1.3;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 40px;
            font-weight: 400;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
            z-index: -1;
        }
        
        .btn:hover::before {
            transform: translateX(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4a6fa5, #6b8cce);
            color: white;
            box-shadow: 0 8px 15px rgba(74, 111, 165, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(74, 111, 165, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #4a6fa5;
            border: 2px solid #4a6fa5;
        }
        
        .btn-secondary:hover {
            background: #f8fafc;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }
        
        /* Decorative elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(74, 111, 165, 0.05);
            z-index: -1;
        }
        
        .circle-1 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            right: -50px;
        }
        
        .circle-2 {
            width: 120px;
            height: 120px;
            top: -60px;
            left: -30px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 1.9rem;
            }
            
            .btn-container {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-top"></div>
        
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" />
            </svg>
        </div>
        
        <h1>Autoimmune AI & Flare Prediction</h1>
        <p class="subtitle">Early detection and prediction of autoimmune disorder flares using advanced machine learning</p>
        
        <div class="btn-container">
            <a href="/register" class="btn btn-primary">Create Account</a>
            <a href="/login" class="btn btn-secondary">Sign In</a>
        </div>
        
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
</body>
</html>
